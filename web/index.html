<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixClaw WebUI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
            --purple: #a371f7;
            --pink: #db61a2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; }
        .app { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { padding: 20px; font-size: 24px; font-weight: 700; color: var(--accent); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 28px; }
        .nav { flex: 1; overflow-y: auto; padding: 10px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s; margin-bottom: 4px; }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); }
        .header h1 { font-size: 18px; font-weight: 600; }
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn:hover { background: var(--bg-primary); border-color: var(--text-muted); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .content { flex: 1; overflow-y: auto; padding: 24px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-title { font-size: 16px; font-weight: 600; }
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 140px); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; gap: 12px; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
        .message.user .message-avatar { background: var(--purple); }
        .message-content { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; line-height: 1.5; }
        .message.user .message-content { background: var(--bg-tertiary); }
        .chat-input-container { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg-secondary); }
        .chat-input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        .chat-input { flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 15px; font-family: inherit; resize: none; min-height: 50px; max-height: 150px; }
        .chat-input:focus { outline: none; border-color: var(--accent); }
        .send-btn { width: 50px; height: 50px; border-radius: 12px; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
        .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .status-dot.online { background: var(--success); }
        .status-dot.error { background: var(--error); }
        .scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .scrollbar::-webkit-scrollbar-track { background: var(--bg-primary); }
        .scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .scrollbar::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input, .form-select { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
        .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🦞</span>
                <span>MixClaw</span>
            </div>
            <nav class="nav">
                <div class="nav-item active" data-page="chat">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    <span>对话</span>
                </div>
                <div class="nav-item" data-page="agents">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span>Agents</span>
                </div>
                <div class="nav-item" data-page="settings">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>设置</span>
                </div>
            </nav>
            <div style="padding: 16px; border-top: 1px solid var(--border);">
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">正在连接...</span>
                </div>
            </div>
        </aside>
        
        <main class="main">
            <!-- Chat Page -->
            <div class="page active" id="page-chat">
                <div class="chat-container">
                    <div class="chat-messages scrollbar" id="chatMessages">
                        <div class="message bot">
                            <div class="message-avatar">🦐</div>
                            <div class="message-content">你好！我是 MixClaw，一个极其轻量的全功能 AI Agent 引擎。有什么可以帮你的？</div>
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <div class="chat-input-wrapper">
                            <textarea class="chat-input" id="chatInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
                            <button class="send-btn" id="sendBtn">
                                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Agents Page -->
            <div class="page" id="page-agents">
                <div class="header">
                    <h1>Agent 管理面板</h1>
                    <button class="btn btn-primary" onclick="loadAgents()">刷新状态</button>
                </div>
                <div class="content">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">主代理 (Main Agent)</span>
                            <span class="status-indicator"><div class="status-dot online"></div> 空闲中</span>
                        </div>
                        <p style="color: var(--text-secondary); font-size: 14px;">当前模型: <span id="agentModelText">Volcengine Doubao</span></p>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">子代理 (Sub-Agents)</span>
                        </div>
                        <div id="subAgentsList" style="color: var(--text-secondary); font-size: 14px;">
                            暂无派生的子代理。你可以通过让主代理执行复杂任务来 spawn 子代理。
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Settings Page -->
            <div class="page" id="page-settings">
                <div class="header">
                    <h1>大模型配置 (Provider Settings)</h1>
                    <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
                </div>
                <div class="content">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">默认模型设置</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label class="form-label">供应商 (Provider)</label>
                                <select class="form-select" id="configProvider">
                                    <option value="volcengine">Volcengine (火山引擎)</option>
                                    <option value="deepseek">DeepSeek</option>
                                    <option value="openai">OpenAI</option>
                                    <option value="ollama">Ollama (本地)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">API 接入点 (Endpoint)</label>
                                <input type="text" class="form-input" id="configEndpoint" placeholder="例如: https://ark.cn-beijing.volces.com/api/v3">
                            </div>
                            <div class="form-group">
                                <label class="form-label">模型名称 (Model / Endpoint ID)</label>
                                <input type="text" class="form-input" id="configModelName" placeholder="例如: ep-20250212-xxxxx">
                            </div>
                            <div class="form-group">
                                <label class="form-label">API 密钥 (API Key)</label>
                                <input type="password" class="form-input" id="configApiKey" placeholder="sk-xxxxxxxxxxxx">
                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">工作区设置</span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">工作区目录 (Workspace Path)</label>
                            <input type="text" class="form-input" id="configWorkspace" placeholder="./workspace">
                        </div>
                        <div class="form-group">
                            <label class="form-label">安全沙箱 (Restrict to Workspace)</label>
                            <select class="form-select" id="configRestrict">
                                <option value="true">是 (禁止访问工作区外文件)</option>
                                <option value="false">否 (允许访问全盘)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let sessionId = "mix-" + Math.random().toString(36).substr(2, 9);
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(`page-${item.dataset.page}`).classList.add('active');
                
                if (item.dataset.page === 'settings') fetchConfig();
            });
        });
        
        // Chat
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMessages = document.getElementById('chatMessages');
        
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        sendBtn.addEventListener('click', sendMessage);
        
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            chatInput.value = '';
            
            const loadingMsg = addMessage('bot', '正在思考...');
            
            try {
                const res = await fetch(`/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId })
                });
                const data = await res.json();
                
                loadingMsg.remove();
                if (data.response) {
                    addMessage('bot', data.response);
                } else if (data.error) {
                    addMessage('bot', `错误: ${data.error}`);
                }
            } catch (e) {
                loadingMsg.remove();
                addMessage('bot', `网络错误: ${e.message}`);
            }
        }
        
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🦐'}</div>
                <div class="message-content">
                    ${content.replace(/\n/g, '<br>')}
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        // Config
        async function fetchConfig() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                if (config) {
                    document.getElementById('configProvider').value = config.provider || 'volcengine';
                    document.getElementById('configEndpoint').value = config.endpoint || '';
                    document.getElementById('configModelName').value = config.model || '';
                    if (config.apiKey) document.getElementById('configApiKey').value = '********';
                    document.getElementById('configWorkspace').value = config.workspace || './workspace';
                    document.getElementById('configRestrict').value = config.restrict ? "true" : "false";
                }
            } catch (e) {
                console.error("Failed to fetch config");
            }
        }
        
        async function saveConfig() {
            const config = {
                provider: document.getElementById('configProvider').value,
                endpoint: document.getElementById('configEndpoint').value,
                model: document.getElementById('configModelName').value,
                workspace: document.getElementById('configWorkspace').value,
                restrict: document.getElementById('configRestrict').value === "true"
            };
            
            const apiKey = document.getElementById('configApiKey').value;
            if (apiKey && apiKey !== '********') {
                config.apiKey = apiKey;
            }
            
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                if (res.ok) {
                    alert('配置保存成功！');
                    checkStatus();
                } else {
                    alert('保存失败。');
                }
            } catch (e) {
                alert('网络错误');
            }
        }
        
        // Status
        async function checkStatus() {
            try {
                const res = await fetch(`/api/health`);
                const data = await res.json();
                
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                
                if (data.status === 'ok') {
                    dot.className = 'status-dot online';
                    text.textContent = data.model ? `已连接 (${data.model})` : '已连接';
                    document.getElementById('agentModelText').textContent = data.model || '未配置';
                } else {
                    dot.className = 'status-dot error';
                    text.textContent = '后端异常';
                }
            } catch (e) {
                document.getElementById('statusDot').className = 'status-dot error';
                document.getElementById('statusText').textContent = '未连接';
            }
        }
        
        checkStatus();
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
